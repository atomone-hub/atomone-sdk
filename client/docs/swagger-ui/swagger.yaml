  /cosmos/gov/v1/params/{params_type}:
    get:
      summary: Params queries all parameters of the gov module.
      operationId: GovV1Params
      responses:
        '200':
          description: A successful response.
          schema:
            type: object
            properties:
              voting_params:
                description: |-
                  Deprecated: Prefer to use `params` instead.
                  voting_params defines the parameters related to voting.
                type: object
                properties:
                  voting_period:
                    type: string
                    description: Duration of the voting period.
              deposit_params:
                description: |-
                  Deprecated: Prefer to use `params` instead.
                  deposit_params defines the parameters related to deposit.
                type: object
                properties:
                  min_deposit:
                    type: array
                    items:
                      type: object
                      properties:
                        denom:
                          type: string
                        amount:
                          type: string
                      description: >-
                        Coin defines a token with a denomination and an amount.


                        NOTE: The amount field is an Int which implements the
                        custom method

                        signatures required by gogoproto.
                    description: Minimum deposit for a proposal to enter voting period.
                  max_deposit_period:
                    type: string
                    description: >-
                      Maximum period for Atom holders to deposit on a proposal.
                      Initial value: 2

                      months.
              tally_params:
                description: |-
                  Deprecated: Prefer to use `params` instead.
                  tally_params defines the parameters related to tally.
                type: object
                properties:
                  quorum:
                    type: string
                    description: >-
                      Minimum percentage of total stake needed to vote for a
                      result to be

                      considered valid.
                  threshold:
                    type: string
                    description: >-
                      Minimum proportion of Yes votes for proposal to pass.
                      Default value: 0.5.
                  constitution_amendment_quorum:
                    type: string
                    title: quorum for constitution amendment proposals
                  constitution_amendment_threshold:
                    type: string
                    description: >-
                      Minimum proportion of Yes votes for a Constitution
                      Amendment proposal to pass. Default value: 0.9.
                  law_quorum:
                    type: string
                    title: quorum for law proposals
                  law_threshold:
                    type: string
                    description: >-
                      Minimum proportion of Yes votes for a Law proposal to
                      pass. Default value: 0.9.
              params:
                description: |-
                  params defines all the paramaters of x/gov module.

                  Since: cosmos-sdk 0.47
                type: object
                properties:
                  min_deposit:
                    type: array
                    items:
                      type: object
                      properties:
                        denom:
                          type: string
                        amount:
                          type: string
                      description: >-
                        Coin defines a token with a denomination and an amount.


                        NOTE: The amount field is an Int which implements the
                        custom method

                        signatures required by gogoproto.
                    description: >-
                      Minimum deposit for a proposal to enter voting period.

                      Deprecated: a dynamic system now determines the minimum
                      deposit,

                      see the other params inside the min_deposit_throttler
                      field.

                      While setting this value returns an error, when queried it
                      is set to the

                      value of the current minimum deposit value as determined
                      by the dynamic

                      system for backward compatibility.
                  max_deposit_period:
                    type: string
                    description: >-
                      Maximum period for Atom holders to deposit on a proposal.
                      Initial value: 2

                      months.
                  voting_period:
                    type: string
                    description: Duration of the voting period.
                  quorum:
                    type: string
                    description: >-
                      Minimum percentage of total stake needed to vote for a
                      result to be
                       considered valid. Default value: 0.25.
                  threshold:
                    type: string
                    description: >-
                      Minimum proportion of Yes votes for proposal to pass.
                      Default value: 2/3.
                  min_initial_deposit_ratio:
                    type: string
                    description: >-
                      The ratio representing the proportion of the deposit value
                      that must be paid at proposal submission.
                  burn_vote_quorum:
                    type: boolean
                    title: burn deposits if a proposal does not meet quorum
                  burn_proposal_deposit_prevote:
                    type: boolean
                    title: burn deposits if the proposal does not enter voting period
                  min_deposit_ratio:
                    type: string
                    description: >-
                      The ratio representing the proportion of the deposit value
                      minimum that

                      must be met when making a deposit. Default value: 0.01.
                      Meaning that for a

                      chain with a min_deposit of 100stake, a deposit of 1stake
                      would be

                      required.


                      Since: cosmos-sdk 0.50
                  constitution_amendment_quorum:
                    type: string
                    title: quorum for constitution amendment proposals
                  constitution_amendment_threshold:
                    type: string
                    description: >-
                      Minimum proportion of Yes votes for a Constitution
                      Amendment proposal to pass. Default value: 0.9.
                  law_quorum:
                    type: string
                    title: quorum for law proposals
                  law_threshold:
                    type: string
                    description: >-
                      Minimum proportion of Yes votes for a Law proposal to
                      pass. Default value: 0.9.
                  quorum_timeout:
                    type: string
                    description: >-
                      Duration of time after a proposal enters the voting
                      period, during which quorum

                      must be achieved to not incur in a voting period
                      extension.
                  max_voting_period_extension:
                    type: string
                    description: >-
